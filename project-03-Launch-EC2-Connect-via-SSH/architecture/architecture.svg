<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    .bg { fill: #f8f9fa; }
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; fill: #333; }
    .title { font-size: 20px; font-weight: bold; fill: #111; }
    .box { fill: #ffffff; stroke: #e1e4e8; stroke-width: 2px; rx: 8px; }
    .line { stroke: #d97706; stroke-width: 2px; fill: none; stroke-dasharray: 4; animation: dash 20s linear infinite; }
    
    @keyframes dash { to { stroke-dashoffset: -1000; } }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .box { fill: #161b22; stroke: #30363d; }
      .text { fill: #c9d1d9; }
      .title { fill: #f0f6fc; }
      .line { stroke: #fbbf24; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" rx="10"/>
  <text x="400" y="40" class="title" text-anchor="middle">EC2 Compute &amp; Secure Access Architecture</text>

  <!-- Users -->
  <rect x="50" y="80" width="150" height="60" class="box" />
  <text x="125" y="110" class="text" text-anchor="middle" font-weight="bold">Admin (PuTTY)</text>
  <text x="125" y="125" class="text" text-anchor="middle" font-size="12px">Port 22</text>

  <rect x="50" y="240" width="150" height="60" class="box" />
  <text x="125" y="270" class="text" text-anchor="middle" font-weight="bold">Web User</text>
  <text x="125" y="285" class="text" text-anchor="middle" font-size="12px">Port 80 (HTTP)</text>

  <rect x="350" y="80" width="150" height="60" class="box" />
  <text x="425" y="110" class="text" text-anchor="middle" font-weight="bold">AWS SSM</text>
  <text x="425" y="125" class="text" text-anchor="middle" font-size="12px">Session Manager</text>

  <!-- EC2 Instance -->
  <rect x="600" y="140" width="160" height="120" class="box" />
  <text x="680" y="170" class="text" text-anchor="middle" font-weight="bold">EC2 Instance</text>
  <text x="680" y="190" class="text" text-anchor="middle" font-size="12px">t2.micro (AL2023)</text>
  <text x="680" y="210" class="text" text-anchor="middle" font-size="12px">Security Group</text>
  <text x="680" y="230" class="text" text-anchor="middle" font-size="12px">Apache Web Server</text>

  <!-- Lines -->
  <path d="M 200 110 L 680 110 L 680 140" class="line" />
  <path d="M 200 270 L 680 270 L 680 260" class="line" />
  <path d="M 500 110 L 600 160" class="line" />
</svg>
