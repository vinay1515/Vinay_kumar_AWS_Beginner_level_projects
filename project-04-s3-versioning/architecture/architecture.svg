<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    .bg { fill: #f8f9fa; }
    .text { font-family: sans-serif; font-size: 14px; fill: #333; }
    .title { font-size: 20px; font-weight: bold; fill: #111; }
    .box { fill: #ffffff; stroke: #e1e4e8; stroke-width: 2px; rx: 8px; }
    .line { stroke: #007bff; stroke-width: 2px; fill: none; stroke-dasharray: 4; animation: dash 10s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -500; } }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .box { fill: #161b22; stroke: #30363d; }
      .text { fill: #c9d1d9; }
      .title { fill: #f0f6fc; }
      .line { stroke: #58a6ff; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" rx="10"/>
  <text x="400" y="40" class="title" text-anchor="middle">S3 Disaster Recovery &amp; Cost Optimization</text>

  <!-- Source Bucket -->
  <rect x="50" y="100" width="200" height="150" class="box" />
  <text x="150" y="130" class="text" text-anchor="middle" font-weight="bold">Source Bucket (Region A)</text>
  <text x="150" y="160" class="text" text-anchor="middle" font-size="12px">Versioning Enabled</text>
  <text x="150" y="190" class="text" text-anchor="middle" font-size="12px">Lifecycle Policies</text>
  <text x="150" y="220" class="text" text-anchor="middle" font-size="12px">→ Standard-IA → Glacier</text>

  <!-- Destination Bucket -->
  <rect x="550" y="100" width="200" height="150" class="box" />
  <text x="650" y="130" class="text" text-anchor="middle" font-weight="bold">Dest Bucket (Region B)</text>
  <text x="650" y="160" class="text" text-anchor="middle" font-size="12px">Versioning Enabled</text>
  <text x="650" y="190" class="text" text-anchor="middle" font-size="12px">Replication DR Copy</text>

  <!-- Replication Process -->
  <rect x="300" y="125" width="200" height="100" class="box" />
  <text x="400" y="160" class="text" text-anchor="middle" font-weight="bold">IAM Replication Role</text>
  <text x="400" y="185" class="text" text-anchor="middle" font-size="12px">s3:ReplicateObject</text>
  <text x="400" y="205" class="text" text-anchor="middle" font-size="12px">Async Transfer</text>

  <path d="M 250 175 L 300 175" class="line" />
  <path d="M 500 175 L 550 175" class="line" />
</svg>
