<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    .bg { fill: #f8f9fa; }
    .text { font-family: sans-serif; font-size: 14px; fill: #333; }
    .title { font-size: 20px; font-weight: bold; fill: #111; }
    .box { fill: #ffffff; stroke: #e1e4e8; stroke-width: 2px; rx: 8px; }
    .vpc-box { fill: none; stroke: #28a745; stroke-width: 3px; rx: 8px; stroke-dasharray: 8; }
    .public { fill: #e6ffed; stroke: #28a745; stroke-width: 2px; rx: 8px; }
    .private { fill: #f1f8ff; stroke: #0366d6; stroke-width: 2px; rx: 8px; }
    .line { stroke: #d97706; stroke-width: 2px; fill: none; stroke-dasharray: 4; animation: dash 10s linear infinite; }
    
    @keyframes dash { to { stroke-dashoffset: -500; } }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .box { fill: #161b22; stroke: #30363d; }
      .text { fill: #c9d1d9; }
      .title { fill: #f0f6fc; }
      .vpc-box { stroke: #3fb950; }
      .public { fill: #033a16; stroke: #3fb950; }
      .private { fill: #05264c; stroke: #58a6ff; }
      .line { stroke: #fbbf24; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" rx="10"/>
  <text x="400" y="40" class="title" text-anchor="middle">Custom VPC Architecture</text>

  <!-- VPC Outline -->
  <rect x="150" y="80" width="500" height="280" class="vpc-box" />
  <text x="400" y="70" class="text" text-anchor="middle" font-weight="bold" fill="#28a745">VPC (10.0.0.0/16)</text>

  <!-- Internet Gateway -->
  <rect x="50" y="200" width="80" height="40" class="box" />
  <text x="90" y="225" class="text" text-anchor="middle" font-weight="bold">IGW</text>

  <!-- Public Subnet -->
  <rect x="200" y="100" width="180" height="240" class="public" />
  <text x="290" y="130" class="text" text-anchor="middle" font-weight="bold">Public Subnet</text>
  
  <rect x="220" y="150" width="140" height="60" class="box" />
  <text x="290" y="175" class="text" text-anchor="middle" font-size="12px">Bastion Host (EC2)</text>
  <text x="290" y="195" class="text" text-anchor="middle" font-size="12px">Public IP</text>

  <rect x="220" y="230" width="140" height="60" class="box" />
  <text x="290" y="255" class="text" text-anchor="middle" font-size="12px">NAT Gateway</text>
  <text x="290" y="275" class="text" text-anchor="middle" font-size="12px">Elastic IP</text>

  <!-- Private Subnet -->
  <rect x="420" y="100" width="180" height="240" class="private" />
  <text x="510" y="130" class="text" text-anchor="middle" font-weight="bold">Private Subnet</text>

  <rect x="440" y="190" width="140" height="60" class="box" />
  <text x="510" y="215" class="text" text-anchor="middle" font-size="12px">Internal Server</text>
  <text x="510" y="235" class="text" text-anchor="middle" font-size="12px">Private IP Only</text>

  <!-- Flow Lines -->
  <path d="M 130 220 L 200 220" class="line" />
  <path d="M 440 220 L 360 220" class="line" stroke-dasharray="2" opacity="0.6"/>
  <path d="M 360 180 L 440 220" class="line" />
</svg>
