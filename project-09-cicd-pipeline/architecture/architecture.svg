<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    .bg { fill: #f8f9fa; }
    .text { font-family: sans-serif; font-size: 14px; fill: #333; }
    .title { font-size: 20px; font-weight: bold; fill: #111; }
    .box { fill: #ffffff; stroke: #e1e4e8; stroke-width: 2px; rx: 8px; }
    .pipeline-box { fill: none; stroke: #007bff; stroke-width: 2px; rx: 8px; stroke-dasharray: 8; }
    .line { stroke: #28a745; stroke-width: 2px; fill: none; stroke-dasharray: 4; animation: dash 10s linear infinite; }
    
    @keyframes dash { to { stroke-dashoffset: -500; } }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .box { fill: #161b22; stroke: #30363d; }
      .text { fill: #c9d1d9; }
      .title { fill: #f0f6fc; }
      .pipeline-box { stroke: #58a6ff; }
      .line { stroke: #3fb950; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" rx="10"/>
  <text x="400" y="40" class="title" text-anchor="middle">AWS CI/CD Pipeline Architecture</text>

  <!-- Developer -->
  <rect x="30" y="160" width="80" height="60" class="box" />
  <text x="70" y="195" class="text" text-anchor="middle" font-weight="bold">Dev</text>

  <!-- CodePipeline Outline -->
  <rect x="150" y="80" width="500" height="240" class="pipeline-box" />
  <text x="400" y="100" class="text" text-anchor="middle" font-weight="bold" fill="#007bff">AWS CodePipeline</text>

  <!-- CodeCommit -->
  <rect x="180" y="150" width="120" height="80" class="box" />
  <text x="240" y="185" class="text" text-anchor="middle" font-weight="bold">CodeCommit</text>
  <text x="240" y="205" class="text" text-anchor="middle" font-size="12px">Git Repository</text>

  <!-- CodeBuild -->
  <rect x="340" y="150" width="120" height="80" class="box" />
  <text x="400" y="185" class="text" text-anchor="middle" font-weight="bold">CodeBuild</text>
  <text x="400" y="205" class="text" text-anchor="middle" font-size="12px">Test &amp; Package</text>

  <!-- CodeDeploy -->
  <rect x="500" y="150" width="120" height="80" class="box" />
  <text x="560" y="185" class="text" text-anchor="middle" font-weight="bold">CodeDeploy</text>
  <text x="560" y="205" class="text" text-anchor="middle" font-size="12px">Rolling Deploy</text>

  <!-- Target EC2 -->
  <rect x="680" y="160" width="100" height="60" class="box" />
  <text x="730" y="195" class="text" text-anchor="middle" font-weight="bold">EC2</text>
  <text x="730" y="210" class="text" text-anchor="middle" font-size="12px">Web Server</text>

  <!-- Flow Lines -->
  <path d="M 110 190 L 180 190" class="line" />
  <path d="M 300 190 L 340 190" class="line" />
  <path d="M 460 190 L 500 190" class="line" />
  <path d="M 620 190 L 680 190" class="line" />
</svg>
