<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Styles -->
  <style>
    .bg { fill: #f8f9fa; }
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; fill: #333; }
    .title { font-size: 20px; font-weight: bold; fill: #111; }
    .box { fill: #ffffff; stroke: #e1e4e8; stroke-width: 2px; rx: 8px; }
    .line { stroke: #007bff; stroke-width: 2px; fill: none; stroke-dasharray: 4; animation: dash 20s linear infinite; }
    .icon { fill: #007bff; }
    .badge { fill: #28a745; rx: 4px; }
    .badge-text { fill: white; font-size: 10px; font-weight: bold; }
    
    @keyframes dash {
      to { stroke-dashoffset: -1000; }
    }
    
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .box { fill: #161b22; stroke: #30363d; }
      .text { fill: #c9d1d9; }
      .title { fill: #f0f6fc; }
      .line { stroke: #58a6ff; }
      .icon { fill: #58a6ff; }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" rx="10"/>

  <!-- Title -->
  <text x="400" y="40" class="title" text-anchor="middle">IAM Setup &amp; Billing Alerts Architecture</text>

  <!-- Root Account Box -->
  <rect x="50" y="80" width="180" height="80" class="box" />
  <text x="140" y="115" class="text" text-anchor="middle" font-weight="bold">Root Account</text>
  <text x="140" y="135" class="text" text-anchor="middle" font-size="12px">MFA Secured</text>
  <circle cx="140" cy="145" r="4" fill="#d73a49"/>

  <!-- IAM User Box -->
  <rect x="50" y="220" width="180" height="80" class="box" />
  <text x="140" y="255" class="text" text-anchor="middle" font-weight="bold">IAM Admin User</text>
  <text x="140" y="275" class="text" text-anchor="middle" font-size="12px">AdminAccess Policy</text>

  <!-- AWS CLI Box -->
  <rect x="50" y="320" width="180" height="50" class="box" />
  <text x="140" y="350" class="text" text-anchor="middle" font-weight="bold">AWS CLI v2</text>

  <!-- Connecting Lines for Left Column -->
  <path d="M 140 160 L 140 220" class="line" />
  <path d="M 140 300 L 140 320" class="line" />

  <!-- CloudWatch Box -->
  <rect x="350" y="80" width="180" height="80" class="box" />
  <text x="440" y="115" class="text" text-anchor="middle" font-weight="bold">CloudWatch Alarm</text>
  <text x="440" y="135" class="text" text-anchor="middle" font-size="12px">Billing > $5</text>

  <!-- SNS Box -->
  <rect x="350" y="220" width="180" height="80" class="box" />
  <text x="440" y="255" class="text" text-anchor="middle" font-weight="bold">SNS Topic</text>
  <text x="440" y="275" class="text" text-anchor="middle" font-size="12px">Alert Notification</text>

  <!-- Email Box -->
  <rect x="570" y="220" width="180" height="80" class="box" />
  <text x="660" y="255" class="text" text-anchor="middle" font-weight="bold">Email Subscriber</text>
  <text x="660" y="275" class="text" text-anchor="middle" font-size="12px">Your Email Address</text>

  <!-- Connecting Lines for Right Column -->
  <path d="M 440 160 L 440 220" class="line" />
  <path d="M 530 260 L 570 260" class="line" />
  
  <!-- Conceptual link from root to billing -->
  <path d="M 230 120 L 350 120" class="line" stroke-dasharray="2" opacity="0.5"/>
</svg>
