  </text>

  <rect x="460"
        y="180"
        width="220"
        height="100"
        fill="#fff"
        stroke="#28a745"
        stroke-width="2"/>

  <text x="570"
        y="220"
        text-anchor="middle"
        font-size="14">
    IAM Admin User
  </text>

  <text x="570"
        y="245"
        text-anchor="middle"
