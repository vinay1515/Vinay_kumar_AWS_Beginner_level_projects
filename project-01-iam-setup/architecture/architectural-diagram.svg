  </text>

  <line x1="230"
        y1="280"
        x2="230"
        y2="360"
        stroke="#555"
        stroke-width="2"
        marker-end="url(#arrow)"/>

  <rect x="100"
        y="360"
        width="260"
        height="90"
        fill="#eef6ff"
        stroke="#1a73e8"
        stroke-width="2"/>

  <text x="230"
        y="395"
        text-anchor="middle"
        font-size="14">
    CloudWatch Billing Alarm
  </text>

  <text x="230"
        y="420"
        text-anchor="middle"
        font-size="12">
    Estimated Charges &gt; $5
  </text>

  <line x1="360"
        y1="405"
        x2="470"
        y2="405"
        stroke="#1a73e8"
        stroke-width="2"
        marker-end="url(#arrow)"/>

  <rect x="470"
        y="360"
        width="120"
        height="90"
        fill="#fff3e0"
        stroke="#fb8c00"
        stroke-width="2"/>

  <text x="530"
        y="405"
        text-anchor="middle"
        font-size="14">
    SNS
  </text>

  <line x1="590"
        y1="405"
        x2="700"
        y2="405"
        stroke="#1a73e8"
        stroke-width="2"
        marker-end="url(#arrow)"/>

  <rect x="700"
        y="360"
        width="80"
        height="90"
        fill="#f3e5f5"
        stroke="#8e24aa"
        stroke-width="2"/>

  <text x="740"
