<svg viewBox="0 0 900 680" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="680" fill="#f8f9fa" rx="12"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#232f3e">Alarm State Machine &amp; Evaluation Logic</text>

  <!-- ── STATE MACHINE (top half) ── -->
  <text x="30" y="68" font-size="13" font-weight="bold" fill="#555">Alarm State Transitions</text>

  <!-- INSUFFICIENT_DATA -->
  <rect x="60" y="82" width="200" height="70" rx="10" fill="#fff8e1" stroke="#f9a825" stroke-width="2.5"/>
  <text x="160" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#f57f17">INSUFFICIENT_DATA</text>
  <text x="160" y="126" text-anchor="middle" font-size="11" fill="#555">No data points yet</text>
  <text x="160" y="142" text-anchor="middle" font-size="10" fill="#888">Initial state after creation</text>

  <!-- OK -->
  <rect x="350" y="82" width="200" height="70" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2.5"/>
  <text x="450" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">OK</text>
  <text x="450" y="126" text-anchor="middle" font-size="11" fill="#555">Metric within threshold</text>
  <text x="450" y="142" text-anchor="middle" font-size="10" fill="#888">ok-action fires on entry</text>

  <!-- ALARM -->
  <rect x="640" y="82" width="200" height="70" rx="10" fill="#ffebee" stroke="#c62828" stroke-width="2.5"/>
  <text x="740" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">ALARM</text>
  <text x="740" y="126" text-anchor="middle" font-size="11" fill="#555">Threshold breached N periods</text>
  <text x="740" y="142" text-anchor="middle" font-size="10" fill="#888">alarm-action fires on entry</text>

  <!-- Transition arrows -->
  <!-- INSUFFICIENT_DATA → OK -->
  <path d="M 260 105 Q 305 88 350 105" fill="none" stroke="#388e3c" stroke-width="2" marker-end="url(#aGreen)"/>
  <text x="305" y="84" text-anchor="middle" font-size="10" fill="#388e3c">first data arrives,</text>
  <text x="305" y="96" text-anchor="middle" font-size="10" fill="#388e3c">metric within threshold</text>

  <!-- INSUFFICIENT_DATA → ALARM -->
  <path d="M 160 152 Q 160 195 740 195 Q 740 165 740 152" fill="none" stroke="#c62828" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#aRed)"/>
  <text x="450" y="210" text-anchor="middle" font-size="10" fill="#c62828">first data arrives already breaching threshold (INSUFFICIENT → ALARM, no email on this transition)</text>

  <!-- OK → ALARM -->
  <path d="M 550 105 Q 595 88 640 105" fill="none" stroke="#c62828" stroke-width="2" marker-end="url(#aRed)"/>
  <text x="595" y="84" text-anchor="middle" font-size="10" fill="#c62828">N consecutive periods</text>
  <text x="595" y="96" text-anchor="middle" font-size="10" fill="#c62828">above threshold</text>

  <!-- ALARM → OK -->
  <path d="M 640 135 Q 595 155 550 135" fill="none" stroke="#388e3c" stroke-width="2" marker-end="url(#aGreen)"/>
  <text x="595" y="160" text-anchor="middle" font-size="10" fill="#388e3c">metric drops below threshold</text>

  <!-- ── EVALUATION PERIOD DIAGRAM (middle) ── -->
  <line x1="30" y1="228" x2="870" y2="228" stroke="#ddd" stroke-width="1"/>
  <text x="30" y="250" font-size="13" font-weight="bold" fill="#555">Evaluation Period Logic — EC2-CPU-High (threshold 70%, 2 periods of 5 min)</text>

  <!-- Timeline base -->
  <rect x="30" y="265" width="840" height="6" rx="3" fill="#e0e0e0"/>

  <!-- Time labels -->
  <text x="30"  y="285" font-size="10" fill="#888">T+0</text>
  <text x="155" y="285" font-size="10" fill="#888">T+5m</text>
  <text x="285" y="285" font-size="10" fill="#888">T+10m</text>
  <text x="415" y="285" font-size="10" fill="#888">T+15m</text>
  <text x="545" y="285" font-size="10" fill="#888">T+20m</text>
  <text x="680" y="285" font-size="10" fill="#888">T+25m</text>
  <text x="810" y="285" font-size="10" fill="#888">T+30m</text>

  <!-- Period blocks -->
  <!-- Period 1: 0-5m CPU=30% OK -->
  <rect x="30"  y="295" width="125" height="46" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="92"  y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Period 1</text>
  <text x="92"  y="331" text-anchor="middle" font-size="11" fill="#333">CPU avg: 30%</text>
  <text x="92"  y="344" text-anchor="middle" font-size="10" fill="#388e3c">✓ OK</text>

  <!-- Period 2: 5-10m CPU=75% BREACH #1 -->
  <rect x="160" y="295" width="125" height="46" rx="4" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5"/>
  <text x="222" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Period 2</text>
  <text x="222" y="331" text-anchor="middle" font-size="11" fill="#333">CPU avg: 75%</text>
  <text x="222" y="344" text-anchor="middle" font-size="10" fill="#e65100">⚡ BREACH 1</text>

  <!-- Period 3: 10-15m CPU=82% BREACH #2 → ALARM -->
  <rect x="290" y="295" width="125" height="46" rx="4" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="352" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#b71c1c">Period 3</text>
  <text x="352" y="331" text-anchor="middle" font-size="11" fill="#333">CPU avg: 82%</text>
  <text x="352" y="344" text-anchor="middle" font-size="10" fill="#c62828">🔔 ALARM fires!</text>

  <!-- Period 4: 15-20m CPU=90% still ALARM -->
  <rect x="420" y="295" width="125" height="46" rx="4" fill="#ffcdd2" stroke="#c62828" stroke-width="1.5"/>
  <text x="482" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#b71c1c">Period 4</text>
  <text x="482" y="331" text-anchor="middle" font-size="11" fill="#333">CPU avg: 90%</text>
  <text x="482" y="344" text-anchor="middle" font-size="10" fill="#c62828">⚠ still ALARM</text>

  <!-- Period 5: 20-25m CPU=55% → OK transition -->
  <rect x="550" y="295" width="125" height="46" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="612" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Period 5</text>
  <text x="612" y="331" text-anchor="middle" font-size="11" fill="#333">CPU avg: 55%</text>
  <text x="612" y="344" text-anchor="middle" font-size="10" fill="#388e3c">✓ → OK recovery</text>

  <!-- Period 6: 25-30m OK -->
  <rect x="680" y="295" width="125" height="46" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="742" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Period 6</text>
  <text x="742" y="331" text-anchor="middle" font-size="11" fill="#333">CPU avg: 20%</text>
  <text x="742" y="344" text-anchor="middle" font-size="10" fill="#388e3c">✓ OK</text>

  <!-- ALARM annotation arrow -->
  <line x1="352" y1="295" x2="352" y2="262" stroke="#c62828" stroke-width="1.5" marker-end="url(#aRed)"/>
  <text x="360" y="258" font-size="10" fill="#c62828">SNS email sent</text>

  <!-- OK recovery annotation -->
  <line x1="612" y1="295" x2="612" y2="262" stroke="#388e3c" stroke-width="1.5" marker-end="url(#aGreen)"/>
  <text x="620" y="258" font-size="10" fill="#388e3c">recovery email</text>

  <!-- ── ALL 8 ALARMS TABLE ── -->
  <line x1="30" y1="360" x2="870" y2="360" stroke="#ddd" stroke-width="1"/>
  <text x="30" y="382" font-size="13" font-weight="bold" fill="#555">All 8 Alarms — Configuration Summary</text>

  <!-- Table header -->
  <rect x="30" y="390" width="840" height="26" rx="4" fill="#232f3e"/>
  <text x="42"  y="408" font-size="11" font-weight="bold" fill="white">Alarm Name</text>
  <text x="242" y="408" font-size="11" font-weight="bold" fill="white">Metric</text>
  <text x="402" y="408" font-size="11" font-weight="bold" fill="white">Threshold</text>
  <text x="522" y="408" font-size="11" font-weight="bold" fill="white">Period × N</text>
  <text x="642" y="408" font-size="11" font-weight="bold" fill="white">Statistic</text>
  <text x="752" y="408" font-size="11" font-weight="bold" fill="white">OK-action</text>

  <!-- Row data -->
  <!-- EC2-CPU-High -->
  <rect x="30" y="416" width="840" height="24" rx="0" fill="#fff8f8"/>
  <text x="42"  y="432" font-size="11" fill="#333">EC2-CPU-High</text>
  <text x="242" y="432" font-size="11" fill="#333">AWS/EC2 CPUUtilization</text>
  <text x="402" y="432" font-size="11" fill="#c62828">&gt; 70%</text>
  <text x="522" y="432" font-size="11" fill="#333">300s × 2</text>
  <text x="642" y="432" font-size="11" fill="#333">Average</text>
  <text x="752" y="432" font-size="11" fill="#388e3c">✓ Yes</text>

  <!-- EC2-StatusCheck -->
  <rect x="30" y="440" width="840" height="24" rx="0" fill="white"/>
  <text x="42"  y="456" font-size="11" fill="#333">EC2-StatusCheck-Failed</text>
  <text x="242" y="456" font-size="11" fill="#333">AWS/EC2 StatusCheckFailed</text>
  <text x="402" y="456" font-size="11" fill="#c62828">≥ 1</text>
  <text x="522" y="456" font-size="11" fill="#333">60s × 2</text>
  <text x="642" y="456" font-size="11" fill="#333">Maximum</text>
  <text x="752" y="456" font-size="11" fill="#888">No</text>

  <!-- EC2-NetworkIn -->
  <rect x="30" y="464" width="840" height="24" rx="0" fill="#fff8f8"/>
  <text x="42"  y="480" font-size="11" fill="#333">EC2-NetworkIn-High</text>
  <text x="242" y="480" font-size="11" fill="#333">AWS/EC2 NetworkIn</text>
  <text x="402" y="480" font-size="11" fill="#c62828">&gt; 5,000,000 bytes</text>
  <text x="522" y="480" font-size="11" fill="#333">300s × 1</text>
  <text x="642" y="480" font-size="11" fill="#333">Average</text>
  <text x="752" y="480" font-size="11" fill="#888">No</text>

  <!-- RDS-CPU -->
  <rect x="30" y="488" width="840" height="24" rx="0" fill="white"/>
  <text x="42"  y="504" font-size="11" fill="#333">RDS-CPU-High</text>
  <text x="242" y="504" font-size="11" fill="#333">AWS/RDS CPUUtilization</text>
  <text x="402" y="504" font-size="11" fill="#c62828">&gt; 80%</text>
  <text x="522" y="504" font-size="11" fill="#333">300s × 2</text>
  <text x="642" y="504" font-size="11" fill="#333">Average</text>
  <text x="752" y="504" font-size="11" fill="#388e3c">✓ Yes</text>

  <!-- RDS-Storage -->
  <rect x="30" y="512" width="840" height="24" rx="0" fill="#fff8f8"/>
  <text x="42"  y="528" font-size="11" fill="#333">RDS-Storage-Low</text>
  <text x="242" y="528" font-size="11" fill="#333">AWS/RDS FreeStorageSpace</text>
  <text x="402" y="528" font-size="11" fill="#c62828">&lt; 2,000,000,000 bytes</text>
  <text x="522" y="528" font-size="11" fill="#333">300s × 1</text>
  <text x="642" y="528" font-size="11" fill="#333">Average</text>
  <text x="752" y="528" font-size="11" fill="#388e3c">✓ Yes</text>

  <!-- RDS-Connections -->
  <rect x="30" y="536" width="840" height="24" rx="0" fill="white"/>
  <text x="42"  y="552" font-size="11" fill="#333">RDS-Connections-High</text>
  <text x="242" y="552" font-size="11" fill="#333">AWS/RDS DatabaseConnections</text>
  <text x="402" y="552" font-size="11" fill="#c62828">&gt; 50</text>
  <text x="522" y="552" font-size="11" fill="#333">300s × 1</text>
  <text x="642" y="552" font-size="11" fill="#333">Average</text>
  <text x="752" y="552" font-size="11" fill="#888">No</text>

  <!-- Billing -->
  <rect x="30" y="560" width="840" height="24" rx="0" fill="#fff8f8"/>
  <text x="42"  y="576" font-size="11" fill="#333">Billing-Alert-5USD</text>
  <text x="242" y="576" font-size="11" fill="#333">AWS/Billing EstimatedCharges</text>
  <text x="402" y="576" font-size="11" fill="#c62828">&gt; $5 USD</text>
  <text x="522" y="576" font-size="11" fill="#333">86400s × 1</text>
  <text x="642" y="576" font-size="11" fill="#333">Maximum</text>
  <text x="752" y="576" font-size="11" fill="#888">No</text>

  <!-- App-Errors -->
  <rect x="30" y="584" width="840" height="24" rx="0" fill="white"/>
  <text x="42"  y="600" font-size="11" fill="#333">App-Errors-High</text>
  <text x="242" y="600" font-size="11" fill="#333">CustomMetrics ApplicationErrors</text>
  <text x="402" y="600" font-size="11" fill="#c62828">&gt; 5 (sum)</text>
  <text x="522" y="600" font-size="11" fill="#333">300s × 1</text>
  <text x="642" y="600" font-size="11" fill="#333">Sum</text>
  <text x="752" y="600" font-size="11" fill="#888">No</text>

  <!-- Table border -->
  <rect x="30" y="390" width="840" height="218" rx="4" fill="none" stroke="#ccc" stroke-width="1"/>
  <line x1="30" y1="416" x2="870" y2="416" stroke="#eee" stroke-width="1"/>

  <!-- treat-missing-data note -->
  <rect x="30" y="620" width="840" height="40" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="450" y="637" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">All alarms: treat-missing-data = notBreaching</text>
  <text x="450" y="653" text-anchor="middle" font-size="11" fill="#555">If metric stops publishing (instance stopped), alarm stays OK — no false alerts when resources are intentionally shut down.</text>

  <defs>
    <marker id="aGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#388e3c"/>
    </marker>
    <marker id="aRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c62828"/>
    </marker>
  </defs>
</svg>