<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    .bg { fill: #f8f9fa; }
    .text { font-family: sans-serif; font-size: 14px; fill: #333; }
    .title { font-size: 20px; font-weight: bold; fill: #111; }
    .box { fill: #ffffff; stroke: #e1e4e8; stroke-width: 2px; rx: 8px; }
    .line { stroke: #d73a49; stroke-width: 2px; fill: none; stroke-dasharray: 4; animation: dash 10s linear infinite; }
    
    @keyframes dash { to { stroke-dashoffset: -500; } }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .box { fill: #161b22; stroke: #30363d; }
      .text { fill: #c9d1d9; }
      .title { fill: #f0f6fc; }
      .line { stroke: #ff7b72; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" rx="10"/>
  <text x="400" y="40" class="title" text-anchor="middle">Observability &amp; Alerting Architecture</text>

  <!-- Metrics Source -->
  <rect x="50" y="100" width="160" height="200" class="box" />
  <text x="130" y="130" class="text" text-anchor="middle" font-weight="bold">Data Sources</text>
  <text x="130" y="170" class="text" text-anchor="middle" font-size="12px">EC2 Instances</text>
  <text x="130" y="210" class="text" text-anchor="middle" font-size="12px">RDS Databases</text>
  <text x="130" y="250" class="text" text-anchor="middle" font-size="12px">Billing Metrics</text>

  <!-- CloudWatch -->
  <rect x="290" y="100" width="220" height="200" class="box" />
  <text x="400" y="130" class="text" text-anchor="middle" font-weight="bold">Amazon CloudWatch</text>
  
  <rect x="310" y="160" width="180" height="40" class="box" />
  <text x="400" y="185" class="text" text-anchor="middle" font-size="12px">Custom Dashboards</text>

  <rect x="310" y="220" width="180" height="50" class="box" />
  <text x="400" y="240" class="text" text-anchor="middle" font-size="12px">CloudWatch Alarms</text>
  <text x="400" y="260" class="text" text-anchor="middle" font-size="10px">(e.g. CPU > 80%)</text>

  <!-- SNS -->
  <rect x="590" y="160" width="160" height="80" class="box" />
  <text x="670" y="190" class="text" text-anchor="middle" font-weight="bold">Amazon SNS</text>
  <text x="670" y="220" class="text" text-anchor="middle" font-size="12px">Email Notifications</text>

  <!-- Flow Lines -->
  <path d="M 210 200 L 290 200" class="line" />
  <path d="M 510 200 L 590 200" class="line" />
</svg>
