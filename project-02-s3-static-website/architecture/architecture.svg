<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    .bg { fill: #f8f9fa; }
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; fill: #333; }
    .title { font-size: 20px; font-weight: bold; fill: #111; }
    .box { fill: #ffffff; stroke: #e1e4e8; stroke-width: 2px; rx: 8px; }
    .line { stroke: #28a745; stroke-width: 2px; fill: none; stroke-dasharray: 4; animation: dash 20s linear infinite; }
    
    @keyframes dash { to { stroke-dashoffset: -1000; } }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .box { fill: #161b22; stroke: #30363d; }
      .text { fill: #c9d1d9; }
      .title { fill: #f0f6fc; }
      .line { stroke: #3fb950; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" rx="10"/>
  <text x="400" y="40" class="title" text-anchor="middle">S3 + CloudFront Architecture</text>

  <!-- Browser -->
  <rect x="50" y="160" width="150" height="80" class="box" />
  <text x="125" y="195" class="text" text-anchor="middle" font-weight="bold">Web Browser</text>
  <text x="125" y="215" class="text" text-anchor="middle" font-size="12px">End User</text>

  <!-- CloudFront -->
  <rect x="325" y="160" width="150" height="80" class="box" />
  <text x="400" y="195" class="text" text-anchor="middle" font-weight="bold">CloudFront CDN</text>
  <text x="400" y="215" class="text" text-anchor="middle" font-size="12px">HTTPS &amp; Cache</text>

  <!-- S3 Bucket -->
  <rect x="600" y="160" width="150" height="80" class="box" />
  <text x="675" y="195" class="text" text-anchor="middle" font-weight="bold">Amazon S3</text>
  <text x="675" y="215" class="text" text-anchor="middle" font-size="12px">index.html (Origin)</text>

  <!-- Lines -->
  <path d="M 200 200 L 325 200" class="line" />
  <path d="M 475 200 L 600 200" class="line" />
</svg>
