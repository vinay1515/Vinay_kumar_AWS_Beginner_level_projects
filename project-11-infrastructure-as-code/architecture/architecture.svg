<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    .bg { fill: #f8f9fa; }
    .text { font-family: sans-serif; font-size: 14px; fill: #333; }
    .title { font-size: 20px; font-weight: bold; fill: #111; }
    .box { fill: #ffffff; stroke: #e1e4e8; stroke-width: 2px; rx: 8px; }
    .cfn-box { fill: none; stroke: #ff9900; stroke-width: 3px; rx: 8px; stroke-dasharray: 8; }
    .line { stroke: #28a745; stroke-width: 2px; fill: none; stroke-dasharray: 4; animation: dash 10s linear infinite; }
    
    @keyframes dash { to { stroke-dashoffset: -500; } }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .box { fill: #161b22; stroke: #30363d; }
      .text { fill: #c9d1d9; }
      .title { fill: #f0f6fc; }
      .line { stroke: #3fb950; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" rx="10"/>
  <text x="400" y="40" class="title" text-anchor="middle">Infrastructure as Code (CloudFormation)</text>

  <!-- YAML Template -->
  <rect x="50" y="140" width="140" height="120" class="box" />
  <text x="120" y="180" class="text" text-anchor="middle" font-weight="bold">main-stack.yaml</text>
  <text x="120" y="210" class="text" text-anchor="middle" font-size="12px">Parameters</text>
  <text x="120" y="230" class="text" text-anchor="middle" font-size="12px">Resources</text>

  <!-- CloudFormation -->
  <rect x="280" y="160" width="140" height="80" class="box" />
  <text x="350" y="195" class="text" text-anchor="middle" font-weight="bold">CloudFormation</text>
  <text x="350" y="215" class="text" text-anchor="middle" font-size="12px">Stack Engine</text>

  <!-- Target Infrastructure -->
  <rect x="490" y="100" width="280" height="200" class="cfn-box" />
  <text x="630" y="130" class="text" text-anchor="middle" font-weight="bold" fill="#ff9900">Provisioned Stack</text>

  <rect x="520" y="150" width="100" height="50" class="box" />
  <text x="570" y="170" class="text" text-anchor="middle" font-weight="bold">VPC</text>
  <text x="570" y="185" class="text" text-anchor="middle" font-size="10px">Networking</text>

  <rect x="640" y="150" width="100" height="50" class="box" />
  <text x="690" y="170" class="text" text-anchor="middle" font-weight="bold">ALB</text>
  <text x="690" y="185" class="text" text-anchor="middle" font-size="10px">Routing</text>

  <rect x="580" y="220" width="100" height="50" class="box" />
  <text x="630" y="240" class="text" text-anchor="middle" font-weight="bold">ASG / EC2</text>
  <text x="630" y="255" class="text" text-anchor="middle" font-size="10px">Compute</text>

  <!-- Flow Lines -->
  <path d="M 190 200 L 280 200" class="line" />
  <path d="M 420 200 L 490 200" class="line" />
</svg>
