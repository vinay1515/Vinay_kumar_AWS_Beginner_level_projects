<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Arial, Helvetica, sans-serif">
  <defs>
  <style>
    :root {
      --bg: #0a0a1a; --bg-gradient-end: #1a1a2e;
      --text-main: #f8fafc; --text-muted: #94a3b8;
      --box-bg: #1a1a3a; --orange: #FF9900; --blue: #1a73e8;
      --green: #2E8B57; --red: #cc3333; --teal: #00897B; --grid: #ffffff08;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc; --bg-gradient-end: #e2e8f0;
        --text-main: #0f172a; --text-muted: #475569;
        --box-bg: #ffffff; --orange: #e68a00; --blue: #1557b0;
        --green: #1f6b42; --red: #b32424; --teal: #00695C; --grid: #00000008;
      }
    }
    svg { background-color: var(--bg); }
    .float { animation: float 6s ease-in-out infinite; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes pulse { 0%,100%{opacity:0.8} 50%{opacity:1;filter:brightness(1.2)} }
  </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--bg)"/><stop offset="100%" stop-color="var(--bg-gradient-end)"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900"/><stop offset="100%" style="stop-color:#FFB84D"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E8B57"/><stop offset="100%" style="stop-color:#3CB371"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc3333"/><stop offset="100%" style="stop-color:#ff5555"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00695C"/><stop offset="100%" style="stop-color:#00897B"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--green)"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--red)"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--orange)"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="var(--grid)" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="700" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="var(--orange)" font-size="22" font-weight="bold" filter="url(#glow)">
    Auto Scaling — Scale-Out and Self-Healing Flow
  </text>
  <text x="600" y="64" text-anchor="middle" fill="var(--text-muted)" font-size="12">
    How ASG responds to high CPU load and instance failure
  </text>
  <line x1="200" y1="76" x2="1000" y2="76" stroke="var(--orange)" stroke-width="0.5" opacity="0.3"/>

  <!-- ====== PHASE 1: NORMAL STATE ====== -->
  <rect x="40" y="90" width="350" height="250" rx="10" fill="var(--box-bg)" stroke="var(--green)" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="90" width="350" height="30" rx="10" fill="url(#greenGrad)" opacity="0.8"/>
  <text x="215" y="111" text-anchor="middle" fill="var(--text-main)" font-size="13" font-weight="bold">Phase 1: Normal State</text>

  <text x="60" y="142" fill="var(--text-muted)" font-size="11">ASG Capacity: 2/2/4 (min/desired/max)</text>
  <text x="60" y="162" fill="var(--text-muted)" font-size="11">CPU: ~15% average</text>

  <rect x="70" y="180" width="140" height="60" rx="6" fill="var(--box-bg)" stroke="var(--green)" stroke-width="1"/>
  <text x="140" y="205" text-anchor="middle" fill="var(--green)" font-size="10" font-weight="bold">🖥️ Instance A</text>
  <text x="140" y="220" text-anchor="middle" fill="var(--green)" font-size="9" class="pulse">✅ InService</text>
  <text x="140" y="232" text-anchor="middle" fill="var(--text-muted)" font-size="8">CPU: 10%</text>

  <rect x="230" y="180" width="140" height="60" rx="6" fill="var(--box-bg)" stroke="var(--green)" stroke-width="1"/>
  <text x="300" y="205" text-anchor="middle" fill="var(--green)" font-size="10" font-weight="bold">🖥️ Instance B</text>
  <text x="300" y="220" text-anchor="middle" fill="var(--green)" font-size="9" class="pulse">✅ InService</text>
  <text x="300" y="232" text-anchor="middle" fill="var(--text-muted)" font-size="8">CPU: 20%</text>

  <text x="215" y="268" text-anchor="middle" fill="var(--text-muted)" font-size="10">ALB: Round-robin traffic to both</text>
  <text x="215" y="284" text-anchor="middle" fill="var(--green)" font-size="10">CloudWatch: All OK ✅</text>
  <text x="215" y="322" text-anchor="middle" fill="var(--text-muted)" font-size="9">Avg CPU 15% &lt; 50% target → no scaling</text>

  <!-- Arrow: Phase 1 to Phase 2 -->
  <line x1="390" y1="215" x2="440" y2="215" stroke="var(--orange)" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="415" y="205" text-anchor="middle" fill="var(--orange)" font-size="9">CPU Spike</text>

  <!-- ====== PHASE 2: HIGH CPU — SCALE OUT ====== -->
  <rect x="450" y="90" width="350" height="250" rx="10" fill="var(--box-bg)" stroke="var(--orange)" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="450" y="90" width="350" height="30" rx="10" fill="url(#orangeGrad)" opacity="0.8"/>
  <text x="625" y="111" text-anchor="middle" fill="var(--text-main)" font-size="13" font-weight="bold">Phase 2: Scale Out</text>

  <text x="470" y="142" fill="var(--text-muted)" font-size="11">CPU: ~80% average (stress test)</text>
  <text x="470" y="162" fill="var(--orange)" font-size="11">CloudWatch Alarm: HIGH 🚨</text>

  <rect x="460" y="180" width="100" height="50" rx="6" fill="var(--box-bg)" stroke="var(--green)" stroke-width="1"/>
  <text x="510" y="200" text-anchor="middle" fill="var(--green)" font-size="9" font-weight="bold">🖥️ A</text>
  <text x="510" y="215" text-anchor="middle" fill="var(--red)" font-size="8">CPU: 100%</text>

  <rect x="570" y="180" width="100" height="50" rx="6" fill="var(--box-bg)" stroke="var(--green)" stroke-width="1"/>
  <text x="620" y="200" text-anchor="middle" fill="var(--green)" font-size="9" font-weight="bold">🖥️ B</text>
  <text x="620" y="215" text-anchor="middle" fill="var(--text-muted)" font-size="8">CPU: 60%</text>

  <rect x="680" y="180" width="100" height="50" rx="6" fill="var(--box-bg)" stroke="var(--orange)" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="730" y="200" text-anchor="middle" fill="var(--orange)" font-size="9" font-weight="bold">🖥️ C</text>
  <text x="730" y="215" text-anchor="middle" fill="var(--orange)" font-size="8">⏳ Pending</text>

  <text x="625" y="255" text-anchor="middle" fill="var(--orange)" font-size="10">ASG → Desired: 2 → 3</text>
  <text x="625" y="275" text-anchor="middle" fill="var(--text-muted)" font-size="9">New instance launching from Launch Template</text>
  <text x="625" y="295" text-anchor="middle" fill="var(--text-muted)" font-size="9">Warmup: 120s (excluded from avg)</text>
  <text x="625" y="315" text-anchor="middle" fill="var(--text-muted)" font-size="9">Instance C registers in Target Group</text>
  <text x="625" y="330" text-anchor="middle" fill="var(--green)" font-size="9">After health check → InService → receives traffic</text>

  <!-- Arrow: Phase 2 to Phase 3 -->
  <line x1="800" y1="215" x2="850" y2="215" stroke="var(--green)" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="825" y="205" text-anchor="middle" fill="var(--green)" font-size="9">Scaled</text>

  <!-- ====== PHASE 3: STABLE AT 3 ====== -->
  <rect x="860" y="90" width="300" height="250" rx="10" fill="var(--box-bg)" stroke="var(--green)" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="860" y="90" width="300" height="30" rx="10" fill="url(#greenGrad)" opacity="0.8"/>
  <text x="1010" y="111" text-anchor="middle" fill="var(--text-main)" font-size="13" font-weight="bold">Phase 3: Scaled State</text>

  <text x="880" y="142" fill="var(--text-muted)" font-size="11">ASG Capacity: Desired = 3</text>
  <text x="880" y="162" fill="var(--green)" font-size="11">CPU: ~45% average ✅</text>

  <rect x="870" y="180" width="85" height="50" rx="6" fill="var(--box-bg)" stroke="var(--green)" stroke-width="1"/>
  <text x="912" y="200" text-anchor="middle" fill="var(--green)" font-size="9" font-weight="bold">🖥️ A</text>
  <text x="912" y="215" text-anchor="middle" fill="var(--text-muted)" font-size="8">CPU: 50%</text>

  <rect x="965" y="180" width="85" height="50" rx="6" fill="var(--box-bg)" stroke="var(--green)" stroke-width="1"/>
  <text x="1007" y="200" text-anchor="middle" fill="var(--green)" font-size="9" font-weight="bold">🖥️ B</text>
  <text x="1007" y="215" text-anchor="middle" fill="var(--text-muted)" font-size="8">CPU: 40%</text>

  <rect x="1060" y="180" width="85" height="50" rx="6" fill="var(--box-bg)" stroke="var(--green)" stroke-width="1"/>
  <text x="1102" y="200" text-anchor="middle" fill="var(--green)" font-size="9" font-weight="bold">🖥️ C</text>
  <text x="1102" y="215" text-anchor="middle" fill="var(--text-muted)" font-size="8">CPU: 45%</text>

  <text x="1010" y="258" text-anchor="middle" fill="var(--text-muted)" font-size="10">Load balanced across 3 instances</text>
  <text x="1010" y="278" text-anchor="middle" fill="var(--green)" font-size="10">All healthy — traffic distributed</text>
  <text x="1010" y="300" text-anchor="middle" fill="var(--text-muted)" font-size="9">When CPU drops below 35%</text>
  <text x="1010" y="316" text-anchor="middle" fill="var(--text-muted)" font-size="9">for 15 min → scale in to 2</text>

  <!-- ====== SELF-HEALING FLOW (bottom) ====== -->

  <!-- Phase 4: Instance Failure -->
  <rect x="40" y="380" width="350" height="280" rx="10" fill="var(--box-bg)" stroke="var(--red)" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="380" width="350" height="30" rx="10" fill="url(#redGrad)" opacity="0.8"/>
  <text x="215" y="401" text-anchor="middle" fill="var(--text-main)" font-size="13" font-weight="bold">Phase 4: Instance Failure</text>

  <text x="60" y="432" fill="var(--text-muted)" font-size="11">Instance A crashes / terminated</text>
  <text x="60" y="452" fill="var(--red)" font-size="11">ALB detects: health check fails 🚨</text>

  <rect x="70" y="470" width="140" height="60" rx="6" fill="var(--box-bg)" stroke="var(--red)" stroke-width="1.5"/>
  <text x="140" y="495" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="bold">💀 Instance A</text>
  <text x="140" y="510" text-anchor="middle" fill="var(--red)" font-size="9">❌ TERMINATED</text>
  <text x="140" y="522" text-anchor="middle" fill="var(--text-muted)" font-size="8">No traffic</text>

  <rect x="230" y="470" width="140" height="60" rx="6" fill="var(--box-bg)" stroke="var(--green)" stroke-width="1"/>
  <text x="300" y="495" text-anchor="middle" fill="var(--green)" font-size="10" font-weight="bold">🖥️ Instance B</text>
  <text x="300" y="510" text-anchor="middle" fill="var(--green)" font-size="9" class="pulse">✅ InService</text>
  <text x="300" y="522" text-anchor="middle" fill="var(--text-muted)" font-size="8">ALL traffic</text>

  <text x="215" y="558" text-anchor="middle" fill="var(--text-muted)" font-size="10">ALB routes 100% traffic to Instance B</text>
  <text x="215" y="578" text-anchor="middle" fill="var(--orange)" font-size="10">ASG detects: instance count &lt; desired</text>
  <text x="215" y="598" text-anchor="middle" fill="var(--text-muted)" font-size="9">ASG launches replacement from Launch Template</text>
  <text x="215" y="618" text-anchor="middle" fill="var(--text-muted)" font-size="9">No manual intervention required!</text>
  <text x="215" y="645" text-anchor="middle" fill="var(--orange)" font-size="9">Timeline: 2-4 minutes to full recovery</text>

  <!-- Arrow: Phase 4 to Phase 5 -->
  <line x1="390" y1="520" x2="440" y2="520" stroke="var(--green)" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="415" y="510" text-anchor="middle" fill="var(--green)" font-size="9">Healed</text>

  <!-- Phase 5: Self-Healed -->
  <rect x="450" y="380" width="350" height="280" rx="10" fill="var(--box-bg)" stroke="var(--green)" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="450" y="380" width="350" height="30" rx="10" fill="url(#greenGrad)" opacity="0.8"/>
  <text x="625" y="401" text-anchor="middle" fill="var(--text-main)" font-size="13" font-weight="bold">Phase 5: Self-Healed</text>

  <text x="470" y="432" fill="var(--text-muted)" font-size="11">ASG launched replacement Instance D</text>
  <text x="470" y="452" fill="var(--green)" font-size="11">All instances healthy ✅</text>

  <rect x="480" y="470" width="140" height="60" rx="6" fill="var(--box-bg)" stroke="var(--green)" stroke-width="1"/>
  <text x="550" y="495" text-anchor="middle" fill="var(--green)" font-size="10" font-weight="bold">🖥️ Instance B</text>
  <text x="550" y="510" text-anchor="middle" fill="var(--green)" font-size="9" class="pulse">✅ InService</text>

  <rect x="640" y="470" width="140" height="60" rx="6" fill="var(--box-bg)" stroke="var(--green)" stroke-width="1"/>
  <text x="710" y="495" text-anchor="middle" fill="var(--green)" font-size="10" font-weight="bold">🖥️ Instance D</text>
  <text x="710" y="510" text-anchor="middle" fill="var(--green)" font-size="9" class="pulse">✅ InService</text>
  <text x="710" y="522" text-anchor="middle" fill="var(--orange)" font-size="8">← NEW</text>

  <text x="625" y="558" text-anchor="middle" fill="var(--text-muted)" font-size="10">Back to normal: 2 healthy instances</text>
  <text x="625" y="578" text-anchor="middle" fill="var(--text-muted)" font-size="10">ALB distributes traffic round-robin</text>
  <text x="625" y="598" text-anchor="middle" fill="var(--green)" font-size="10">Zero downtime achieved!</text>
  <text x="625" y="625" text-anchor="middle" fill="var(--text-muted)" font-size="9">Instance D has different ID but same config</text>
  <text x="625" y="645" text-anchor="middle" fill="var(--text-muted)" font-size="9">(Same AMI, same user data, same SG)</text>

  <!-- ====== TIMELINE (bottom right) ====== -->
  <rect x="860" y="380" width="300" height="280" rx="10" fill="var(--box-bg)" stroke="var(--orange)" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="860" y="380" width="300" height="30" rx="10" fill="url(#orangeGrad)" opacity="0.8"/>
  <text x="1010" y="401" text-anchor="middle" fill="var(--text-main)" font-size="13" font-weight="bold">📊 Timeline</text>

  <text x="880" y="435" fill="var(--orange)" font-size="11" font-weight="bold">Scale-Out Event:</text>
  <text x="880" y="455" fill="var(--text-muted)" font-size="10">T+0m: CPU spike detected</text>
  <text x="880" y="473" fill="var(--text-muted)" font-size="10">T+3m: CloudWatch alarm fires</text>
  <text x="880" y="491" fill="var(--text-muted)" font-size="10">T+3m: ASG launches instance</text>
  <text x="880" y="509" fill="var(--text-muted)" font-size="10">T+5m: User data completes</text>
  <text x="880" y="527" fill="var(--text-muted)" font-size="10">T+7m: Health check passes</text>
  <text x="880" y="545" fill="var(--green)" font-size="10">T+8m: Instance receives traffic ✅</text>

  <line x1="880" y1="555" x2="1140" y2="555" stroke="var(--text-muted)" stroke-width="0.5" opacity="0.3"/>

  <text x="880" y="575" fill="var(--red)" font-size="11" font-weight="bold">Self-Healing Event:</text>
  <text x="880" y="595" fill="var(--text-muted)" font-size="10">T+0s: Instance terminated</text>
  <text x="880" y="613" fill="var(--text-muted)" font-size="10">T+30s: ALB marks unhealthy</text>
  <text x="880" y="631" fill="var(--text-muted)" font-size="10">T+60s: ASG launches replacement</text>
  <text x="880" y="649" fill="var(--green)" font-size="10">T+3-4m: New instance healthy ✅</text>

  <!-- Legend -->
  <rect x="40" y="672" width="1120" height="22" rx="5" fill="var(--box-bg)" stroke="#333" stroke-width="0.5"/>
  <circle cx="70" cy="683" r="5" fill="var(--green)"/>
  <text x="82" y="687" fill="var(--text-muted)" font-size="10">Healthy / Normal</text>
  <circle cx="200" cy="683" r="5" fill="var(--orange)"/>
  <text x="212" y="687" fill="var(--text-muted)" font-size="10">Scaling Event</text>
  <circle cx="320" cy="683" r="5" fill="var(--red)"/>
  <text x="332" y="687" fill="var(--text-muted)" font-size="10">Failed / Terminated</text>
  <line x1="470" y1="683" x2="510" y2="683" stroke="var(--orange)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="518" y="687" fill="var(--text-muted)" font-size="10">Pending Instance</text>
  <text x="700" y="687" fill="var(--text-muted)" font-size="10">ASG: Min 2 | Desired 2 | Max 4 • Target Tracking: 50% CPU</text>
</svg>
