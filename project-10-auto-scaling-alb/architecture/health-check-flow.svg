<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="Arial, Helvetica, sans-serif">
  <defs>
  <style>
    :root {
      --bg: #0a0a1a; --bg-gradient-end: #1a1a2e;
      --text-main: #f8fafc; --text-muted: #94a3b8;
      --box-bg: #1a1a3a; --orange: #FF9900; --blue: #1a73e8;
      --green: #2E8B57; --teal: #00897B; --grid: #ffffff08;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc; --bg-gradient-end: #e2e8f0;
        --text-main: #0f172a; --text-muted: #475569;
        --box-bg: #ffffff; --orange: #e68a00; --blue: #1557b0;
        --green: #1f6b42; --teal: #00695C; --grid: #00000008;
      }
    }
    svg { background-color: var(--bg); }
    .float { animation: float 6s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--bg)"/><stop offset="100%" stop-color="var(--bg-gradient-end)"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900"/><stop offset="100%" style="stop-color:#FFB84D"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/><stop offset="100%" style="stop-color:#4d94ff"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E8B57"/><stop offset="100%" style="stop-color:#3CB371"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00695C"/><stop offset="100%" style="stop-color:#00897B"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--orange)"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--green)"/>
    </marker>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="var(--grid)" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="500" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" fill="var(--orange)" font-size="22" font-weight="bold" filter="url(#glow)">
    ALB Health Check Flow
  </text>
  <text x="600" y="58" text-anchor="middle" fill="var(--text-muted)" font-size="12">
    How the ALB determines instance health and routes traffic
  </text>
  <line x1="200" y1="70" x2="1000" y2="70" stroke="var(--orange)" stroke-width="0.5" opacity="0.3"/>

  <!-- ====== ALB ====== -->
  <rect x="40" y="90" width="220" height="120" rx="8" fill="var(--box-bg)" stroke="var(--blue)" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="90" width="220" height="26" rx="8" fill="url(#blueGrad)" opacity="0.9"/>
  <text x="150" y="108" text-anchor="middle" fill="var(--text-main)" font-size="11" font-weight="bold"><tspan class="float">⚖️ ALB</tspan></text>
  <text x="150" y="138" text-anchor="middle" fill="var(--text-muted)" font-size="10">Sends health check</text>
  <text x="150" y="156" text-anchor="middle" fill="var(--text-muted)" font-size="10">every 30 seconds</text>
  <text x="150" y="174" text-anchor="middle" fill="var(--blue)" font-size="9">HTTP GET /</text>
  <text x="150" y="192" text-anchor="middle" fill="var(--text-muted)" font-size="9">Timeout: 5 seconds</text>

  <!-- Arrow: ALB sends check -->
  <line x1="260" y1="150" x2="340" y2="150" stroke="var(--orange)" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="300" y="140" text-anchor="middle" fill="var(--orange)" font-size="8">HTTP GET /</text>

  <!-- ====== EC2 INSTANCE ====== -->
  <rect x="350" y="90" width="200" height="120" rx="8" fill="var(--box-bg)" stroke="var(--green)" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="350" y="90" width="200" height="26" rx="8" fill="url(#greenGrad)" opacity="0.9"/>
  <text x="450" y="108" text-anchor="middle" fill="var(--text-main)" font-size="11" font-weight="bold"><tspan class="float">🖥️ EC2 Instance</tspan></text>
  <text x="450" y="138" text-anchor="middle" fill="var(--text-muted)" font-size="10">Apache httpd :80</text>
  <text x="450" y="156" text-anchor="middle" fill="var(--text-muted)" font-size="10">Responds with status</text>
  <text x="450" y="174" text-anchor="middle" fill="var(--green)" font-size="9">200 OK → healthy</text>
  <text x="450" y="192" text-anchor="middle" fill="var(--text-muted)" font-size="9">5xx / timeout → count failure</text>

  <!-- Arrow: EC2 responds -->
  <line x1="550" y1="150" x2="640" y2="150" stroke="var(--green)" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="595" y="140" text-anchor="middle" fill="var(--green)" font-size="8">Response</text>

  <!-- ====== DECISION ====== -->
  <rect x="650" y="90" width="250" height="120" rx="8" fill="var(--box-bg)" stroke="var(--orange)" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="650" y="90" width="250" height="26" rx="8" fill="url(#orangeGrad)" opacity="0.9"/>
  <text x="775" y="108" text-anchor="middle" fill="var(--text-main)" font-size="11" font-weight="bold"><tspan class="float">🎯 Target Group Decision</tspan></text>
  <text x="775" y="138" text-anchor="middle" fill="var(--text-muted)" font-size="10">Success code: 200</text>
  <text x="775" y="158" text-anchor="middle" fill="var(--green)" font-size="10">2 consecutive 200 → HEALTHY</text>
  <text x="775" y="178" text-anchor="middle" fill="var(--text-muted)" font-size="10">2 consecutive fail → UNHEALTHY</text>
  <text x="775" y="198" text-anchor="middle" fill="var(--text-muted)" font-size="9">State determines traffic routing</text>

  <!-- ====== HEALTHY PATH ====== -->
  <line x1="775" y1="210" x2="775" y2="255" stroke="var(--green)" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="650" y="260" width="250" height="90" rx="8" fill="var(--box-bg)" stroke="var(--green)" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="650" y="260" width="250" height="26" rx="8" fill="url(#greenGrad)" opacity="0.9"/>
  <text x="775" y="278" text-anchor="middle" fill="var(--text-main)" font-size="11" font-weight="bold">✅ HEALTHY</text>
  <text x="775" y="305" text-anchor="middle" fill="var(--text-muted)" font-size="10">Instance receives traffic</text>
  <text x="775" y="323" text-anchor="middle" fill="var(--text-muted)" font-size="10">ALB sends requests round-robin</text>
  <text x="775" y="341" text-anchor="middle" fill="var(--green)" font-size="9">Continue checking every 30s</text>

  <!-- ====== UNHEALTHY PATH ====== -->
  <line x1="900" y1="150" x2="970" y2="150" stroke="var(--orange)" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <rect x="980" y="90" width="180" height="120" rx="8" fill="var(--box-bg)" stroke="#cc3333" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="980" y="90" width="180" height="26" rx="8" fill="#cc3333" opacity="0.6"/>
  <text x="1070" y="108" text-anchor="middle" fill="var(--text-main)" font-size="11" font-weight="bold">❌ UNHEALTHY</text>
  <text x="1070" y="138" text-anchor="middle" fill="var(--text-muted)" font-size="10">Traffic stopped</text>
  <text x="1070" y="156" text-anchor="middle" fill="var(--text-muted)" font-size="10">ALB skips this target</text>
  <text x="1070" y="176" text-anchor="middle" fill="var(--text-muted)" font-size="10">ASG notified</text>
  <text x="1070" y="196" text-anchor="middle" fill="#cc3333" font-size="9">ASG terminates and replaces</text>

  <!-- ====== HEALTH CHECK CONFIGURATION TABLE ====== -->
  <rect x="40" y="270" width="560" height="200" rx="8" fill="var(--box-bg)" stroke="var(--teal)" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="270" width="560" height="26" rx="8" fill="url(#tealGrad)" opacity="0.9"/>
  <text x="320" y="288" text-anchor="middle" fill="var(--text-main)" font-size="11" font-weight="bold">📋 Health Check Configuration (This Project)</text>

  <!-- Table headers -->
  <text x="70" y="315" fill="var(--orange)" font-size="10" font-weight="bold">Setting</text>
  <text x="280" y="315" fill="var(--orange)" font-size="10" font-weight="bold">Value</text>
  <text x="450" y="315" fill="var(--orange)" font-size="10" font-weight="bold">Why</text>
  <line x1="60" y1="322" x2="580" y2="322" stroke="var(--text-muted)" stroke-width="0.5" opacity="0.3"/>

  <text x="70" y="340" fill="var(--text-muted)" font-size="9">Protocol</text>
  <text x="280" y="340" fill="var(--text-main)" font-size="9">HTTP</text>
  <text x="450" y="340" fill="var(--text-muted)" font-size="9">Matches app protocol</text>

  <text x="70" y="358" fill="var(--text-muted)" font-size="9">Path</text>
  <text x="280" y="358" fill="var(--text-main)" font-size="9">/</text>
  <text x="450" y="358" fill="var(--text-muted)" font-size="9">Root page always exists</text>

  <text x="70" y="376" fill="var(--text-muted)" font-size="9">Interval</text>
  <text x="280" y="376" fill="var(--text-main)" font-size="9">30 seconds</text>
  <text x="450" y="376" fill="var(--text-muted)" font-size="9">Balance detection vs cost</text>

  <text x="70" y="394" fill="var(--text-muted)" font-size="9">Timeout</text>
  <text x="280" y="394" fill="var(--text-main)" font-size="9">5 seconds</text>
  <text x="450" y="394" fill="var(--text-muted)" font-size="9">Fail fast on unresponsive</text>

  <text x="70" y="412" fill="var(--text-muted)" font-size="9">Healthy threshold</text>
  <text x="280" y="412" fill="var(--text-main)" font-size="9">2 consecutive</text>
  <text x="450" y="412" fill="var(--text-muted)" font-size="9">Confirm recovery</text>

  <text x="70" y="430" fill="var(--text-muted)" font-size="9">Unhealthy threshold</text>
  <text x="280" y="430" fill="var(--text-main)" font-size="9">2 consecutive</text>
  <text x="450" y="430" fill="var(--text-muted)" font-size="9">Avoid false positives</text>

  <text x="70" y="448" fill="var(--text-muted)" font-size="9">Success codes</text>
  <text x="280" y="448" fill="var(--text-main)" font-size="9">200</text>
  <text x="450" y="448" fill="var(--text-muted)" font-size="9">Standard HTTP OK</text>

  <text x="70" y="466" fill="var(--text-muted)" font-size="9">Grace period</text>
  <text x="280" y="466" fill="var(--text-main)" font-size="9">120 seconds</text>
  <text x="450" y="466" fill="var(--text-muted)" font-size="9">User data boot time</text>

  <!-- Timeline at bottom right -->
  <rect x="980" y="260" width="180" height="200" rx="8" fill="var(--box-bg)" stroke="var(--orange)" stroke-width="1" filter="url(#shadow)"/>
  <rect x="980" y="260" width="180" height="26" rx="8" fill="url(#orangeGrad)" opacity="0.7"/>
  <text x="1070" y="278" text-anchor="middle" fill="var(--text-main)" font-size="10" font-weight="bold">⏱ Detection Time</text>

  <text x="1000" y="305" fill="var(--text-muted)" font-size="9">Best case:</text>
  <text x="1000" y="323" fill="var(--green)" font-size="9">30s (1 check interval)</text>
  <text x="1000" y="345" fill="var(--text-muted)" font-size="9">Worst case:</text>
  <text x="1000" y="363" fill="var(--orange)" font-size="9">65s (interval + timeout</text>
  <text x="1000" y="378" fill="var(--orange)" font-size="9">+ second check)</text>
  <text x="1000" y="400" fill="var(--text-muted)" font-size="9">Recovery time:</text>
  <text x="1000" y="418" fill="var(--green)" font-size="9">60s min (2 × 30s checks)</text>
  <text x="1000" y="440" fill="var(--text-muted)" font-size="9">Full replacement:</text>
  <text x="1000" y="458" fill="var(--green)" font-size="9">3-4 minutes total</text>

  <!-- Legend -->
  <rect x="40" y="478" width="1120" height="18" rx="5" fill="var(--box-bg)" stroke="#333" stroke-width="0.5"/>
  <circle cx="70" cy="487" r="4" fill="var(--green)"/>
  <text x="80" y="491" fill="var(--text-muted)" font-size="9">Healthy Response</text>
  <circle cx="200" cy="487" r="4" fill="#cc3333"/>
  <text x="210" y="491" fill="var(--text-muted)" font-size="9">Unhealthy / Failed</text>
  <circle cx="340" cy="487" r="4" fill="var(--orange)"/>
  <text x="350" y="491" fill="var(--text-muted)" font-size="9">Decision Point</text>
  <circle cx="460" cy="487" r="4" fill="var(--blue)"/>
  <text x="470" y="491" fill="var(--text-muted)" font-size="9">ALB Source</text>
  <text x="700" y="491" fill="var(--text-muted)" font-size="9">Health checks run independently for each registered target in the Target Group</text>
</svg>
