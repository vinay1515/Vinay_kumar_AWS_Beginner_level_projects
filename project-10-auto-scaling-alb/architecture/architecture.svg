<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    .bg { fill: #f8f9fa; }
    .text { font-family: sans-serif; font-size: 14px; fill: #333; }
    .title { font-size: 20px; font-weight: bold; fill: #111; }
    .box { fill: #ffffff; stroke: #e1e4e8; stroke-width: 2px; rx: 8px; }
    .asg-box { fill: none; stroke: #d73a49; stroke-width: 2px; rx: 8px; stroke-dasharray: 8; }
    .line { stroke: #0052cc; stroke-width: 2px; fill: none; stroke-dasharray: 4; animation: dash 10s linear infinite; }
    
    @keyframes dash { to { stroke-dashoffset: -500; } }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .box { fill: #161b22; stroke: #30363d; }
      .text { fill: #c9d1d9; }
      .title { fill: #f0f6fc; }
      .asg-box { stroke: #ff7b72; }
      .line { stroke: #58a6ff; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" rx="10"/>
  <text x="400" y="40" class="title" text-anchor="middle">Elastic Load Balancing &amp; Auto Scaling</text>

  <!-- Internet -->
  <rect x="350" y="80" width="100" height="40" class="box" />
  <text x="400" y="105" class="text" text-anchor="middle" font-weight="bold">Internet</text>

  <!-- ALB -->
  <rect x="250" y="150" width="300" height="60" class="box" />
  <text x="400" y="175" class="text" text-anchor="middle" font-weight="bold">Application Load Balancer</text>
  <text x="400" y="195" class="text" text-anchor="middle" font-size="12px">HTTP :80 (Round Robin)</text>

  <!-- ASG Boundary -->
  <rect x="150" y="240" width="500" height="120" class="asg-box" />
  <text x="400" y="380" class="text" text-anchor="middle" font-weight="bold" fill="#d73a49">Auto Scaling Group (Target Capacity: 2-4)</text>

  <!-- EC2 Instances -->
  <rect x="180" y="260" width="120" height="70" class="box" />
  <text x="240" y="290" class="text" text-anchor="middle" font-weight="bold">EC2 (AZ 1)</text>
  <text x="240" y="310" class="text" text-anchor="middle" font-size="12px">Target Grp</text>

  <rect x="340" y="260" width="120" height="70" class="box" />
  <text x="400" y="290" class="text" text-anchor="middle" font-weight="bold">EC2 (AZ 2)</text>
  <text x="400" y="310" class="text" text-anchor="middle" font-size="12px">Target Grp</text>

  <rect x="500" y="260" width="120" height="70" class="box" />
  <text x="560" y="290" class="text" text-anchor="middle" font-weight="bold">EC2 (AZ 1)</text>
  <text x="560" y="310" class="text" text-anchor="middle" font-size="12px">Dynamic</text>

  <!-- Flow Lines -->
  <path d="M 400 120 L 400 150" class="line" />
  
  <path d="M 400 210 L 240 260" class="line" />
  <path d="M 400 210 L 400 260" class="line" />
  <path d="M 400 210 L 560 260" class="line" />
</svg>
