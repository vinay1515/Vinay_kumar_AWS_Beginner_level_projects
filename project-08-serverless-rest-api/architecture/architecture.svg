<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    .bg { fill: #f8f9fa; }
    .text { font-family: sans-serif; font-size: 14px; fill: #333; }
    .title { font-size: 20px; font-weight: bold; fill: #111; }
    .box { fill: #ffffff; stroke: #e1e4e8; stroke-width: 2px; rx: 8px; }
    .line { stroke: #0052cc; stroke-width: 2px; fill: none; stroke-dasharray: 4; animation: dash 10s linear infinite; }
    
    @keyframes dash { to { stroke-dashoffset: -500; } }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .box { fill: #161b22; stroke: #30363d; }
      .text { fill: #c9d1d9; }
      .title { fill: #f0f6fc; }
      .line { stroke: #58a6ff; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" rx="10"/>
  <text x="400" y="40" class="title" text-anchor="middle">Serverless REST API Architecture</text>

  <!-- Client -->
  <rect x="50" y="160" width="100" height="60" class="box" />
  <text x="100" y="195" class="text" text-anchor="middle" font-weight="bold">Client App</text>

  <!-- API Gateway -->
  <rect x="230" y="140" width="140" height="100" class="box" />
  <text x="300" y="170" class="text" text-anchor="middle" font-weight="bold">API Gateway</text>
  <text x="300" y="195" class="text" text-anchor="middle" font-size="12px">REST API</text>
  <text x="300" y="215" class="text" text-anchor="middle" font-size="12px">HTTPS Endpoint</text>

  <!-- Lambda -->
  <rect x="450" y="140" width="140" height="100" class="box" />
  <text x="520" y="170" class="text" text-anchor="middle" font-weight="bold">AWS Lambda</text>
  <text x="520" y="195" class="text" text-anchor="middle" font-size="12px">Python Backend</text>
  <text x="520" y="215" class="text" text-anchor="middle" font-size="12px">Proxy Integration</text>

  <!-- DynamoDB -->
  <rect x="670" y="140" width="100" height="100" class="box" />
  <text x="720" y="170" class="text" text-anchor="middle" font-weight="bold">DynamoDB</text>
  <text x="720" y="195" class="text" text-anchor="middle" font-size="12px">NoSQL Table</text>
  <text x="720" y="215" class="text" text-anchor="middle" font-size="12px">Users Data</text>

  <!-- Flow Lines -->
  <path d="M 150 190 L 230 190" class="line" />
  <path d="M 370 190 L 450 190" class="line" />
  <path d="M 590 190 L 670 190" class="line" />
  
  <text x="190" y="180" class="text" text-anchor="middle" font-size="12px">HTTP</text>
  <text x="410" y="180" class="text" text-anchor="middle" font-size="12px">Event</text>
  <text x="630" y="180" class="text" text-anchor="middle" font-size="12px">SDK</text>
</svg>
