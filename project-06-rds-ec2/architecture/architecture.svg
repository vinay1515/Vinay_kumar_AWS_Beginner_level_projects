<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <style>
    .bg { fill: #f8f9fa; }
    .text { font-family: sans-serif; font-size: 14px; fill: #333; }
    .title { font-size: 20px; font-weight: bold; fill: #111; }
    .box { fill: #ffffff; stroke: #e1e4e8; stroke-width: 2px; rx: 8px; }
    .public { fill: #e6ffed; stroke: #28a745; stroke-width: 2px; rx: 8px; }
    .private { fill: #f1f8ff; stroke: #0366d6; stroke-width: 2px; rx: 8px; }
    .line { stroke: #d73a49; stroke-width: 2px; fill: none; stroke-dasharray: 4; animation: dash 10s linear infinite; }
    
    @keyframes dash { to { stroke-dashoffset: -500; } }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .box { fill: #161b22; stroke: #30363d; }
      .text { fill: #c9d1d9; }
      .title { fill: #f0f6fc; }
      .public { fill: #033a16; stroke: #3fb950; }
      .private { fill: #05264c; stroke: #58a6ff; }
      .line { stroke: #ff7b72; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" rx="10"/>
  <text x="400" y="40" class="title" text-anchor="middle">Two-Tier Web &amp; Database Architecture</text>

  <!-- User -->
  <rect x="20" y="160" width="100" height="60" class="box" />
  <text x="70" y="190" class="text" text-anchor="middle" font-weight="bold">Internet</text>

  <!-- Public Subnet / App Tier -->
  <rect x="180" y="100" width="220" height="200" class="public" />
  <text x="290" y="130" class="text" text-anchor="middle" font-weight="bold">Public Subnet (App Tier)</text>
  
  <rect x="210" y="160" width="160" height="100" class="box" />
  <text x="290" y="190" class="text" text-anchor="middle" font-weight="bold">EC2 Web Server</text>
  <text x="290" y="210" class="text" text-anchor="middle" font-size="12px">Security Group: Web-SG</text>
  <text x="290" y="230" class="text" text-anchor="middle" font-size="12px">IAM Instance Profile</text>

  <!-- Private Subnet / DB Tier -->
  <rect x="480" y="100" width="220" height="200" class="private" />
  <text x="590" y="130" class="text" text-anchor="middle" font-weight="bold">Private Subnet (DB Tier)</text>

  <rect x="510" y="160" width="160" height="100" class="box" />
  <text x="590" y="190" class="text" text-anchor="middle" font-weight="bold">RDS MySQL</text>
  <text x="590" y="210" class="text" text-anchor="middle" font-size="12px">Security Group: DB-SG</text>
  <text x="590" y="230" class="text" text-anchor="middle" font-size="12px">Not Publicly Accessible</text>

  <!-- Flow Lines -->
  <path d="M 120 190 L 180 190" class="line" />
  <path d="M 400 190 L 480 190" class="line" />
  <text x="440" y="180" class="text" text-anchor="middle" font-size="12px">Port 3306</text>
</svg>
